---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-dynamodb
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: dynamodb=docker.io/saidsef/aws-dynamodb-local
    argocd-image-updater.argoproj.io/dynamodb.force-update: "true"
    argocd-image-updater.argoproj.io/dynamodb.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: data
    server: https://kubernetes.default.svc
  project: default
  source:
    path: deployment
    repoURL: https://github.com/saidsef/aws-dynamodb-local.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
